services:

  # ── PostgreSQL for Flight Service ─────────────────────────────────────────────
  flight-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flightuser
      POSTGRES_PASSWORD: flightpass
      POSTGRES_DB: flightdb
    volumes:
      - flight_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightuser -d flightdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PostgreSQL for Booking Service ────────────────────────────────────────────
  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookinguser
      POSTGRES_PASSWORD: bookingpass
      POSTGRES_DB: bookingdb
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookinguser -d bookingdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis Sentinel (master + replica + sentinel) ──────────────────────────────
  redis-master:
    image: redis:6-alpine
    command: redis-server --port 6379 --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-replica:
    image: redis:6-alpine
    command: redis-server --port 6379 --replicaof redis-master 6379 --save "" --appendonly no
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-sentinel:
    image: redis:6-alpine
    command: >
      sh -c "
        printf 'port 26379\nsentinel monitor mymaster redis-master 6379 1\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 30000\nsentinel parallel-syncs mymaster 1\n' > /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  # ── Flight Service (gRPC) ─────────────────────────────────────────────────────
  flight-service:
    build:
      context: services/flight-service
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://flightuser:flightpass@flight-db/flightdb
      GRPC_PORT: "50051"
      GRPC_API_KEY: "super-secret-api-key"
      REDIS_SENTINEL_HOSTS: "redis-sentinel:26379"
      REDIS_SENTINEL_MASTER: "mymaster"
      REDIS_TTL_SECONDS: "300"
      DEBUG: "false"
    ports:
      - "50051:50051"
    depends_on:
      flight-db:
        condition: service_healthy
      redis-sentinel:
        condition: service_healthy

  # ── Booking Service (REST) ────────────────────────────────────────────────────
  booking-service:
    build:
      context: services/booking-service
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://bookinguser:bookingpass@booking-db/bookingdb
      FLIGHT_SERVICE_URL: "flight-service:50051"
      GRPC_API_KEY: "super-secret-api-key"
      CB_FAILURE_THRESHOLD: "5"
      CB_RECOVERY_TIMEOUT: "30.0"
      RETRY_MAX_ATTEMPTS: "3"
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      booking-db:
        condition: service_healthy
      flight-service:
        condition: service_started

volumes:
  flight_db_data:
  booking_db_data:
